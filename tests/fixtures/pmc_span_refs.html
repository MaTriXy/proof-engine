<h2>Results</h2>
<div class="sec">
<p>Clinical trials show that increased n-6 PUFA<sup><span class="ref"><a href="#r1">1</a></span></sup> intake does not increase markers<sup id="xref-ref-2"><a href="#ref-2"><span>2</span></a></sup> of inflammation. Multiple meta-analyses<sup>[3],[4]</sup> confirm these findings.</p>
